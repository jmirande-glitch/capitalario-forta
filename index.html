<style>
  @import url('https://fonts.googleapis.com/css2?family=Abel&family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap');

  :root{
    --navy: #1B3A5C;      /* azul oficial Schoenstatt Arg. (tipografía y acentos) */
    --navy-deep: #16324F; /* variante mas oscura, solo para paneles chicos, nunca negro */
    --sky: #7FA3D1;       /* celeste oficial, para fondos amplios */
    --gold: #C9962C;      /* dorado oficial, para detalles */
    --gold-light: #E3BD74;
    --periwinkle: #6B7FC4; /* complementario oficial */
    --brownie: #6E4A2E;    /* complementario oficial (marrón) */
    --tan: #C98A4B;        /* complementario oficial (arena/durazno) */
    --slate: #55606B;
    --brown: #6E4A2E;
    --cream: #F6EFE0;
    --ink: #1F2733;
    --white: #FFFFFF;
    --radius: 22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--navy);}
  body{
    font-family:'Open Sans',sans-serif;
    color:var(--ink);
    overscroll-behavior:none;
    user-select:none;
  }
  h1,h2,h3,.display{font-family:'Abel',sans-serif;}

  #app{
    width:100%;
    max-width:520px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    position:relative;
    background:var(--cream);
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,.5);
  }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; pointer-events:none;
    transform: translateY(12px);
    transition: opacity .28s ease, transform .28s ease;
  }
  .screen.active{ opacity:1; pointer-events:auto; transform:translateY(0); }

  /* ---------- HOME ---------- */
  #screen-home{ }
  .portada-compact{
    flex: 0 0 auto;
    background:
      radial-gradient(120% 140% at 50% -30%, #2E5480 0%, var(--navy) 55%, var(--navy-deep) 100%);
    color:var(--white);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 16px 24px 14px;
    position:relative;
    overflow:hidden;
  }
  .logo-wrap{
    background:var(--white); border-radius:14px;
    padding:6px 12px 5px; margin-bottom:8px;
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
  .logo-img{ display:block; width:min(22vw,90px); height:auto; }
  .portada-compact h1{
    font-size:clamp(20px,5.5vw,26px); line-height:1.05; margin:0 0 3px; font-weight:400;
    letter-spacing:.02em;
  }
  .portada-compact .sub{
    font-size:13px; color:#CBD8E4; margin:0 0 6px; font-weight:500;
  }
  .portada-compact .quote{
    font-family:'Abel',sans-serif; font-style:italic; font-size:12.5px;
    color:#EADFC4; max-width:320px; line-height:1.3; margin:0;
  }
  .portada-compact .quote span{ display:block; margin-top:3px; font-size:10.5px; font-style:normal; color:#9BAEC2; letter-spacing:.05em;}

  /* ---------- METRICS ON HOME (default view) ---------- */
  .home-stats-scroll{
    flex:1; overflow-y:auto;
    background:var(--cream);
    padding: 20px 20px 110px;
  }

  /* ---------- FLOATING ACTION BUTTON ---------- */
  .fab{
    position:absolute; right:20px; bottom:24px;
    width:68px; height:68px; border-radius:50%;
    background:var(--gold); color:var(--navy-deep);
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 26px rgba(0,0,0,.35);
    z-index:30;
    animation: fab-pulse 2.4s ease-in-out infinite;
  }
  .fab svg{ width:30px; height:30px; }
  .fab:active{ filter:brightness(.94); animation:none; }
  @keyframes fab-pulse{
    0%   { box-shadow:0 10px 26px rgba(0,0,0,.35), 0 0 0 0 rgba(201,150,44,.55); }
    70%  { box-shadow:0 10px 26px rgba(0,0,0,.35), 0 0 0 16px rgba(201,150,44,0); }
    100% { box-shadow:0 10px 26px rgba(0,0,0,.35), 0 0 0 0 rgba(201,150,44,0); }
  }

  /* ---------- BACK BUTTON (reused on grid input header) ---------- */
  .backbtn{
    width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.12); border:none; color:var(--white);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .input-hero .hero-icon{ flex-shrink:0; }
  .backbtn svg{ width:20px; height:20px; }

  .garden-wrap{
    display:flex; flex-direction:column; align-items:center;
    margin-bottom: 22px;
  }
  #garden-svg{ width:min(72vw,270px); height:auto; }
  .goal-number{ text-align:center; margin-top:10px; }
  .goal-number .big{ font-family:'Abel',sans-serif; font-size:52px; font-weight:400; color:var(--navy); }
  .goal-number .lbl{ font-size:14px; color:var(--slate); font-weight:600; }

  .cat-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;
  }
  .cat-card{
    background:var(--white); border-radius:16px; padding:14px 14px 12px;
    border:1px solid #ece3cc;
    display:flex; flex-direction:column; gap:6px;
  }
  .cat-card .icon{ width:26px; height:26px; }
  .cat-card .num{ font-family:'Abel',sans-serif; font-size:30px; font-weight:400; line-height:1; }
  .cat-card .lbl{ font-size:12.5px; color:var(--slate); font-weight:600; }

  /* ---------- GRID (selección de aporte) ---------- */
  #screen-grid{ background:linear-gradient(180deg, #EAF1F9 0%, var(--cream) 100%); }
  .grid-8{
    flex:1; display:grid;
    grid-template-columns:repeat(2,1fr);
    grid-auto-rows:1fr;
    gap:3px;
    padding:3px;
    overflow-y:auto;
  }
  .tile{
    position:relative; border:none; padding:0; margin:0;
    aspect-ratio:1/1; overflow:hidden; cursor:pointer;
    display:flex; align-items:flex-end;
    border-radius:14px;
  }
  .tile:active{ transform:scale(.97); }
  .tile-back{
    background:linear-gradient(160deg, var(--navy), var(--navy-deep));
    display:flex; align-items:center; justify-content:center;
  }
  .tile-back svg{ width:34%; height:34%; color:var(--gold-light); }
  .tile-img{
    width:100%; height:100%; position:relative;
    background-size:cover;
  }
  .tile-icon{
    position:absolute; top:14%; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
  }
  .tile-icon svg{ width:34%; height:34%; }
  .tile-label{
    position:absolute; left:0; right:0; bottom:0;
    background:rgba(0,0,0,.42);
    color:var(--white); font-weight:800;
    font-size:clamp(12px,3.4vw,15px);
    text-align:center; line-height:1.15;
    padding:8px 6px 9px;
  }

  /* ---------- INPUT ---------- */
  #screen-input{ background:var(--cream); }
  .input-hero{
    padding:20px 20px 10px; display:flex; align-items:center; gap:14px;
    background:var(--navy); color:var(--white);
  }
  .input-hero .hero-icon{ width:34px; height:34px; flex-shrink:0; }
  .input-hero h2{ margin:0; font-size:19px; font-weight:700; }
  .input-hero p{ margin:2px 0 0; font-size:13px; color:#B9C7D6; }

  .stepper-area{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 10px 24px 4px;
  }
  .stepper{
    display:flex; align-items:center; justify-content:center; gap:18px;
    width:100%;
  }
  .step-btn{
    width:74px; height:74px; border-radius:50%; border:none;
    background:var(--white); box-shadow:0 3px 0 #ddd2ac;
    font-size:34px; font-weight:800; color:var(--navy);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .step-btn:active{ box-shadow:0 1px 0 #ddd2ac; transform:translateY(2px); }
  .step-value{
    min-width:150px; text-align:center;
  }
  .step-value .n{ font-family:'Abel',sans-serif; font-size:84px; font-weight:400; color:var(--navy); line-height:1; }
  .step-value .u{ font-size:15px; color:var(--slate); font-weight:600; margin-top:4px; }

  .quick-amounts{ display:flex; gap:10px; margin-top:26px; flex-wrap:wrap; justify-content:center; }
  .qa-btn{
    padding:10px 18px; border-radius:999px; border:1.5px solid #d8cca3;
    background:var(--white); font-weight:700; font-size:15px; color:var(--navy);
    cursor:pointer;
  }
  .qa-btn:active{ background:#efe6cd; }

  .confirm-area{ padding:16px 20px 26px; }
  .confirm-btn{
    width:100%; padding:19px; border:none; border-radius:18px;
    background:var(--gold); color:var(--navy-deep);
    font-size:19px; font-weight:800; font-family:'Open Sans',sans-serif;
    cursor:pointer;
  }
  .confirm-btn:active{ filter:brightness(.94); }
  .anon-note{
    text-align:center; font-size:12.5px; color:#8a8060; margin-top:10px;
  }

  /* ---------- TOAST ---------- */
  .toast{
    position:absolute; left:50%; bottom:-120px; transform:translateX(-50%);
    background:var(--navy); color:var(--white);
    padding:16px 26px; border-radius:16px;
    font-weight:700; font-size:16px;
    display:flex; align-items:center; gap:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    transition:bottom .35s ease;
    z-index:50; white-space:nowrap;
  }
  .toast.show{ bottom:26px; }
  .toast svg{ width:22px; height:22px; color:var(--gold-light); }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>

// Frases del P. José Kentenich, rotan una por día
const QUOTES = [
  '"Todo lo que se hace con amor es semilla de un mundo nuevo."',
  '"Como el pájaro ama su nido, amo yo mi Santuario."',
  '"Rezar significa hallar, en todo momento, un camino hacia Dios."',
];
function renderQuote(){
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const q = QUOTES[dayOfYear % QUOTES.length];
  document.getElementById('kentenich-quote').innerHTML = q + '<span>— P. José Kentenich</span>';
}
renderQuote();

function loadData(){
  let d = localStorage.getItem('cdg_data');
  if(!d){
    d = {}; CATS.forEach(c => d[c.id] = 0);
    localStorage.setItem('cdg_data', JSON.stringify(d));
    return d;
  }
  return JSON.parse(d);
}
function saveData(d){ localStorage.setItem('cdg_data', JSON.stringify(d)); }

// historial de cada carga (para el jardín de luces y el total de aportes)
function loadHistory(){
  return JSON.parse(localStorage.getItem('cdg_history') || '[]');
}
function pushHistory(catId){
  const h = loadHistory();
  h.push(catId);
  localStorage.setItem('cdg_history', JSON.stringify(h));
}

let data = loadData();
let currentCat = null;
let currentVal = 1;

// ---------- navegación ----------
function go(screenId){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-'+screenId);
  target.classList.add('active');
  target.scrollTop = 0;
  const scrollable = target.querySelector('.home-stats-scroll, .grid-8');
  if(scrollable) scrollable.scrollTop = 0;
  if(screenId === 'home') renderStats();
}
document.querySelectorAll('[data-go]').forEach(el=>{
  el.addEventListener('click', ()=> go(el.dataset.go));
});

// ---------- construir grilla de 7 categorías ----------
const grid = document.getElementById('grid-8');
CATS.forEach(cat=>{
  const btn = document.createElement('button');
  btn.className = 'tile tile-img';
  // Foto real (banco libre de derechos, Pexels License: pexels.com/license - uso libre, sin atribucion obligatoria)
  btn.style.backgroundImage = `linear-gradient(180deg, rgba(10,20,35,.05) 45%, rgba(10,20,35,.75) 100%), url('${cat.photo}')`;
  btn.style.backgroundSize = 'cover';
  btn.style.backgroundPosition = 'center';
  btn.innerHTML = `<div class="tile-label">${cat.label}</div>`;
  btn.addEventListener('click', ()=> openInput(cat));
  grid.appendChild(btn);
});

function shade(hex, percent){
  const num = parseInt(hex.replace('#',''),16);
  let r = (num>>16) + percent, g=(num>>8 & 0x00FF)+percent, b=(num & 0x0000FF)+percent;
  r=Math.max(Math.min(255,r),0); g=Math.max(Math.min(255,g),0); b=Math.max(Math.min(255,b),0);
  return '#'+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);
}

// ---------- pantalla de carga ----------
function openInput(cat){
  currentCat = cat;
  currentVal = cat.default;
  document.getElementById('input-title').textContent = cat.label;
  document.getElementById('input-example').textContent = cat.example;
  document.getElementById('input-icon').innerHTML = cat.icon;
  document.getElementById('step-unit').textContent = cat.unit;
  updateStepDisplay();

  // sugerencias rápidas según categoría
  const quick = document.getElementById('quick-amounts');
  quick.innerHTML = '';
  const suggestions = cat.id==='km' ? [5,10,20,200]
                    : cat.id==='horas' ? [1,2,3,5]
                    : [1,2,3];
  suggestions.forEach(v=>{
    const b = document.createElement('button');
    b.className='qa-btn'; b.textContent = v + ' ' + cat.unit;
    b.addEventListener('click', ()=>{ currentVal = v; updateStepDisplay(); });
    quick.appendChild(b);
  });

  go('input');
}

function updateStepDisplay(){
  document.getElementById('step-num').textContent = currentVal;
}
document.getElementById('input-back').addEventListener('click', ()=> go('grid'));

document.getElementById('step-minus').addEventListener('click', ()=>{
  currentVal = Math.max(1, currentVal-1); updateStepDisplay();
});
document.getElementById('step-plus').addEventListener('click', ()=>{
  currentVal = currentVal+1; updateStepDisplay();
});

document.getElementById('confirm-btn').addEventListener('click', ()=>{
  data[currentCat.id] += currentVal;
  saveData(data);
  pushHistory(currentCat.id);
  showToast();
  setTimeout(()=> go('grid'), 900);
});

function showToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1400);
}

// ---------- estadísticas ----------
// Jardín de luces: cada aporte cargado enciende una luz más en una espiral
// que crece de adentro hacia afuera (ángulo áureo, tipo semillas de girasol).
// Es una forma más viva de mostrar la acumulación que una simple barra.
const GARDEN_MAX_POINTS = 260; // tope visual, por prolijidad y performance
function renderGarden(history){
  const g = document.getElementById('garden-points');
  const empty = document.getElementById('garden-empty');
  g.innerHTML = '';

  if(history.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const shown = history.slice(0, GARDEN_MAX_POINTS);
  const goldenAngle = 137.508 * Math.PI/180;
  const scale = 8.2;
  shown.forEach((catId, i)=>{
    const cat = CATS.find(c => c.id === catId) || CATS[0];
    const r = scale * Math.sqrt(i);
    const a = i * goldenAngle;
    const x = 150 + r * Math.cos(a);
    const y = 150 + r * Math.sin(a);
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', x.toFixed(1));
    dot.setAttribute('cy', y.toFixed(1));
    dot.setAttribute('r', 5.4);
    dot.setAttribute('fill', cat.color);
    dot.setAttribute('stroke', '#fffaf0');
    dot.setAttribute('stroke-width', '1');
    dot.style.filter = `drop-shadow(0 0 3px ${cat.color}99)`;
    g.appendChild(dot);
  });

  if(history.length > GARDEN_MAX_POINTS){
    const extra = document.createElementNS('http://www.w3.org/2000/svg','text');
    extra.setAttribute('x', 150); extra.setAttribute('y', 292);
    extra.setAttribute('text-anchor','middle');
    extra.setAttribute('font-family','Open Sans, sans-serif');
    extra.setAttribute('font-size','11');
    extra.setAttribute('font-weight','700');
    extra.setAttribute('fill','#a89a6d');
    extra.textContent = `+ ${history.length - GARDEN_MAX_POINTS} luces más`;
    g.appendChild(extra);
  }
}

function renderStats(){
  data = loadData();
  const history = loadHistory();
  document.getElementById('stat-total').textContent = history.length;
  renderGarden(history);

  const catGrid = document.getElementById('cat-grid');
  catGrid.innerHTML = '';
  CATS.forEach(c=>{
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <svg class="icon" viewBox="0 0 48 48" fill="none" stroke="${c.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg>
      <div class="num" style="color:${c.color}">${data[c.id]}</div>
      <div class="lbl">${c.unit}</div>`;
    catGrid.appendChild(card);
  });
}

renderStats();
</script>
